<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histología - Capsula</title>

    <!-- Bootstrap (layout y componentes) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- ==============================
     ESTILOS PROPIOS
============================== -->
    <link rel="stylesheet" href="../../../css/estiloGeneral.css" /><!-- estilos globales -->
    <link rel="stylesheet" href="../../../css/estiloVisor.css" /> <!-- visor -->
    <link rel="stylesheet" href="../../../css/estiloPanel.css" /><!-- panel lateral -->
</head>

<body>

    <div id="header-container"></div>

    <div class="container-fluid container-pag">

        <div class="text-center my-4">
            <h2 class="fw-bold text-primary">Sistema Linfohematopoyetico</h2>
        </div>

        <div class="row">
            <div class="col-lg-12">

                <div class="image-container">

                    <div id="viewer">
                        <!-- VISOR (OpenSeadragon)-->
                        <!-- Aquí se renderiza la imagen -->

                        <div id="viewer-main"></div>

                        <!-- PANEL DESCRIPCIÓN ---------------------------------------------->

                        <div id="panel-descripcion">

                            <h3 class="title">Capsula</h3>

                            <div class="text-content-area">

                                <!-- = PÁGINA 4X (ACTIVA POR DEFECTO)-->
                                <div class="pagina active" data-level="4" data-id="capsula4x">
                                    <p><strong>AUMENTO 4X:</strong></p>
                                    <p>

                                    </p>
                                </div>

                                <!-- = PÁGINA 10X -->
                                <div class="pagina" data-level="10" data-id="capsula10x">
                                    <p><strong>AUMENTO 10X:</strong></p>
                                    <p>

                                    </p>


                                </div>
                                <!-- = PÁGINA 40X -->
                                <div class="pagina" data-level="40" data-id="capsula40x">
                                    <p><strong>AUMENTO 40X:</strong></p>
                                    <p>

                                    </p>
                                </div>

                            </div>
                        </div>
                        <!-- ==============================
     TOOLBAR (CONTROLES DEL VISOR)
============================== -->
                        <div id="visor-toolbar" class="visor-toolbar">

                            <!-- IZQUIERDA: navegación básica -->
                            <div class="toolbar-left">

                                <!-- Ir a imagen inicial -->
                                <button id="btn-home" class="btn-control">
                                    <i class="bi bi-house"></i>
                                </button>

                                <!-- Volver a la anterior (historial) -->
                                <button id="btn-back" class="btn-control">
                                    <i class="bi bi-arrow-left"></i>
                                </button>

                                <!-- Salir de pantalla completa -->
                                <button id="btn-exit" class="btn-control">
                                    <i class="bi bi-x-circle"></i>
                                </button>

                            </div>

                            <!-- CENTRO: controles del visor -->
                            <div class="toolbar-center">

                                <!-- Zoom out -->
                                <button id="zoom-out" class="btn-control">
                                    <i class="bi bi-zoom-out"></i>
                                </button>

                                <!-- Zoom in -->
                                <button id="zoom-in" class="btn-control">
                                    <i class="bi bi-zoom-in"></i>
                                </button>

                                <!-- Ajustar imagen a pantalla -->
                                <button id="fit-btn" class="btn-control">
                                    <i class="bi bi-aspect-ratio"></i>
                                </button>

                                <!-- Activar/desactivar fullscreen -->
                                <button id="fullscreen-btn" class="btn-control">
                                    <i class="bi bi-fullscreen"></i>
                                </button>

                                <!-- Mostrar/ocultar etiquetas -->
                                <button id="toggle-labels" class="btn-control">
                                    <i class="bi bi-tag"></i>
                                </button>

                                <!-- Mostrar/ocultar panel lateral -->
                                <button id="btn-panel" class="btn-control">
                                    <i class="bi bi-layout-sidebar"></i>
                                </button>
                            </div>
                        </div>

                        <!-- ==============================
    IMÁGENES
============================== -->
                        <!-- Funciona como fuente de datos para JS (crearEstructura).
-->
                        <div style="display:none;">

                            <!-- IMAGEN INICIAL (4X) -->
                            <!-- data-inicial="true" define la imagen que se carga al inicio -->
                            <button class="thumb-btn" data-level="4" data-id="capsula4x"
                                data-src="images/capsula/capsula4x.jpg" data-inicial="true">
                            </button>

                            <!-- IMAGEN 10X -->
                            <button class="thumb-btn" data-level="10" data-id="capsula10x"
                                data-src="images/capsula/capsula10x.jpg">
                            </button>

                            <!-- IMÁGENES 40X -->
                            <button class="thumb-btn" data-level="40" data-id="capsula40x"
                                data-src="images/capsula/capsula40x.jpg">
                            </button>


                        </div>


                        <!-- CONFIGURACIÓN VACÍA POR AHORA -->

                        <!-- cuadrante 4x a 10x-->>
                        <div id="config-cuadrantes" style="display:none;">

                            <div data-parent="4" 
                                data-parent-id="capsula4x" 
                                data-target="capsula10x"
                                data-target-level="10" 
                                data-label="10X" data-x="0.5233" data-y="0.2128" data-w="0.1715"
                                data-h="0.1029">
                            </div>

                            <div data-parent="10" 
                            data-parent-id="capsula10x" 
                            data-target="capsula40x"
                            data-target-level="40" 
                            data-label="40X" 
                            data-x="0.436" data-y="0.2163" data-w="0.2338" data-h="0.1273">
                            </div>

                        </div>

                        <div id="footer-container"></div>

                        <!-- SCRIPTS -->
                        <script src="../../js/plantilla.js"></script>

                        <!-- Bootstrap JS (componentes interactivos) -->
                        <script
                            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

                        <!-- OpenSeadragon (motor del visor) -->
                        <script
                            src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

                        <!-- Script principal PARA EL VISOR DE IMÁGENES -->
                        <script type="module" src="../../../js/main.js"></script>
</body>

</html>
