<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histología - Arteria</title>
    <!-- ==============================
     LIBRERÍAS EXTERNAS
============================== -->

    <!-- Bootstrap (layout y componentes) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- ==============================
     ESTILOS PROPIOS
============================== -->
    <link rel="stylesheet" href="../../../css/estiloGeneral.css" /><!-- estilos globales -->
    <link rel="stylesheet" href="../../../css/estiloVisor.css" /> <!-- visor -->
    <link rel="stylesheet" href="../../../css/estiloPanel.css" /><!-- panel lateral -->


</head>

<body>

    <!-- Header dinámico (cargado por JS) -->
    <div id="header-container"></div>
    <!-- ==============================
     CONTENEDOR PRINCIPAL
============================== -->
    <div class="container-fluid container-pag">

        <div class="text-center my-4">
            <h2 class="fw-bold text-primary">LAGOTHRIX - Sistema Digestivo - Estómago </h2>
        </div>

        <div class="row">
            <div class="col-lg-12">

                <div class="image-container">

                    <div id="viewer">
                        <!-- VISOR (OpenSeadragon)-->
                        <!-- Aquí se renderiza la imagen -->

                        <div id="viewer-main"></div>

                        <!-- PANEL DESCRIPCIÓN ---------------------------------------------->

                        <div id="panel-descripcion">

                            <h3 class="title">Estómago</h3>

                            <div class="text-content-area">

                                <!-- = PÁGINA 4X (ACTIVA POR DEFECTO)-->
                                <div class="pagina active" data-level="4" data-id="estomago4x">
                                    <p><strong>AUMENTO 4X:</strong></p>
                                    <p>
                                        AGREGAR INFORMACION
                                    </p>
                                    <!-- <ul>
                                        <li><strong>TI:</strong> Túnica íntima</li>
                                        <li><strong>TM:</strong> Túnica media</li>
                                        <li><strong>TA:</strong> Túnica adventicia</li>
                                    </ul> -->
                                </div>

                                <!-- = PÁGINA 10X -->
                                <div class="pagina" data-level="10" data-id="estomago10X">
                                    <p><strong>AUMENTO 10X:</strong></p>
                                    <p>
                                        AGREGAR INFORMACION
                                    </p>
                                </div>
                                <!-- = PÁGINA 40X -->
                                <div class="pagina" data-level="10" data-id="estomago40X">
                                    <p><strong>AUMENTO 10X:</strong></p>
                                    <p>
                                        AGREGAR INFORMACION
                                    </p>
                                </div>
                            </div>
                            <!-- ==============================
     TOOLBAR (CONTROLES DEL VISOR)
============================== -->
                            <div id="visor-toolbar" class="visor-toolbar">

                                <!-- IZQUIERDA: navegación básica -->
                                <div class="toolbar-left">

                                    <!-- Ir a imagen inicial -->
                                    <button id="btn-home" class="btn-control">
                                        <i class="bi bi-house"></i>
                                    </button>

                                    <!-- Volver a la anterior (historial) -->
                                    <button id="btn-back" class="btn-control">
                                        <i class="bi bi-arrow-left"></i>
                                    </button>

                                    <!-- Salir de pantalla completa -->
                                    <button id="btn-exit" class="btn-control">
                                        <i class="bi bi-x-circle"></i>
                                    </button>

                                </div>

                                <!-- CENTRO: controles del visor -->
                                <div class="toolbar-center">

                                    <!-- Zoom out -->
                                    <button id="zoom-out" class="btn-control">
                                        <i class="bi bi-zoom-out"></i>
                                    </button>

                                    <!-- Zoom in -->
                                    <button id="zoom-in" class="btn-control">
                                        <i class="bi bi-zoom-in"></i>
                                    </button>

                                    <!-- Ajustar imagen a pantalla -->
                                    <button id="fit-btn" class="btn-control">
                                        <i class="bi bi-aspect-ratio"></i>
                                    </button>

                                    <!-- Activar/desactivar fullscreen -->
                                    <button id="fullscreen-btn" class="btn-control">
                                        <i class="bi bi-fullscreen"></i>
                                    </button>

                                    <!-- Mostrar/ocultar etiquetas -->
                                    <button id="toggle-labels" class="btn-control">
                                        <i class="bi bi-tag"></i>
                                    </button>

                                    <!-- Mostrar/ocultar panel lateral -->
                                    <button id="btn-panel" class="btn-control">
                                        <i class="bi bi-layout-sidebar"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- ==============================
    IMÁGENES
============================== -->
                            <!-- Funciona como fuente de datos para JS (crearEstructura).
-->
                            <div style="display:none;">

                                <!-- IMAGEN INICIAL (4X) -->
                                <!-- data-inicial="true" define la imagen que se carga al inicio -->
                                <button class="thumb-btn" data-level="4" data-id="estomago4x"
                                    data-src="img/estomago/4X.jpg" data-inicial="true">
                                </button>

                                <!-- IMAGEN 10X -->
                                <button class="thumb-btn" data-level="10" data-id="estomago10X"
                                    data-src="img/estomago/10X.jpg">
                                </button>

                                <!-- IMÁGENES 40X -->
                                <button class="thumb-btn" data-level="40" data-id="estomago40X"
                                    data-src="img/estomago/40X.jpg">
                                </button>

                                <button class="thumb-btn" data-level="40" data-id="estomago40X2"
                                    data-src="img/estomago/40X2.jpg">
                                </button>


                            </div>
                            <!-- ==============================
    ETIQUETAS
============================== -->

                            <!-- EJEMPLO (4X) -->
                            <!-- 
    data-level → nivel de imagen QUE PUEDE SER 4, 10 o 40
    data-id    → NOMBRE DE LA IMAGEN A LA QUE SE ASOCIA (data-id de los botones anteriores)
    data-x/y   → coordenadas
    data-label → texto mostrado EN LA ETIQUETA
    -->
                            <div id="config-etiquetas" style="display:none;">



                                <!-- ==============================
    CUADRANTES (ENLACES ENTRE NIVELES)
============================== -->
                                <!-- 
Bloque que define áreas clicables.
Permiten navegar entre imágenes (niveles 4, 10, 40).
-->
                                <div id="config-cuadrantes" style="display:none;">
                                    <!-- EJEMPLO: de 4X → 10X -->
                                    <!-- 
    data-parent       → nivel actual= (4, 10 o 40)
    data-parent-id    → imagen origen (data-id de los botones anteriores)
    data-target       → id de destino ADONDE QUIERES IR (data-id de los botones anteriores)
    data-target-level → nivel destino (4, 10 o 40)
    data-x/y          → posición (inicio)
    data-w/h          → tamaño (ancho/alto)
    data-label        → texto mostrado en hover = 4X, 10X o 40X
    -->
                                    <!-- CUADRANTE PARA LLEVAR A 10X DESDE 4X -->


                                    <div data-parent="4" data-parent-id="estomago4x" data-target="estomago10X"
                                        data-target-level="10" data-label="10X" data-x="0.4267" data-y="0.0365"
                                        data-w="0.4482" data-h="0.2702">
                                    </div>

                                    <div data-parent="10" data-parent-id="estomago10X" data-target="estomago40X"
                                        data-target-level="40" data-label="40X" data-x="0.4724" data-y="-0.0005"
                                        data-w="0.5019" data-h="0.2052">
                                    </div>
<!-- 
                                    <div data-parent="40" data-parent-id="estomago40X" data-target="estomago40X2"
                                        data-target-level="40" data-label="40X2" data-x="0.066" data-y="0.0202"
                                        data-w="0.6085" data-h="0.3914"> -->
                                    </div>
                                    <!-- ==============================
     FOOTER DINÁMICO
============================== -->
                                    <!-- Se carga contenido común (footer) mediante JS -->
                                    <div id="footer-container"></div>

                                    <!-- ==============================
     SCRIPTS
============================== -->

                                    <!-- Plantilla: carga header/footer dinámicos -->
                                    <script src="../../../js/plantilla.js"></script>

                                    <!-- Bootstrap JS (componentes interactivos) -->
                                    <script
                                        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

                                    <!-- OpenSeadragon (motor del visor) -->
                                    <script
                                        src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

                                    <!-- Script principal PARA EL VISOR DE IMÁGENES -->
                                    <script type="module" src="../../../js/main.js"></script>
</body>

</html>
